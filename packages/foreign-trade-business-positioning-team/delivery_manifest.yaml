export_policy:
  default_mode: "manifest_first"
  copy_raw_sources: false
  copy_sanitized_cards: true
  copy_case_examples: "only_desensitized"
  require_review_before_external_delivery:
    - "privacy_review"
    - "copyright_review"
    - "client_case_permission_review"
    - "platform_upload_test"
    - "data_privacy_desensitization_review"

data_upgrade_policy:
  no_private_data_in_delivery: true
  public_link_only_output_level: "hypothesis_only"
  customer_data_priority: "backend_inquiry_sales_sku_before_public_competitor_scan"
  required_gate: "decision-sufficiency-gate"
