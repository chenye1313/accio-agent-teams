team_name_cn: "外贸经营定位专家Team"
package_status: "architecture_ready_not_full_export"

source_of_truth:
  canonical_knowledge_root: "knowledge-base/"
  process_evidence_root: "process/"
  raw_books_root: "书籍/"
  deliverable_team_root: "agent-ready/Teams/外贸经营定位专家Team/"

delivery_roots:
  team_package:
    path: "."
    include_in_delivery: true
    purpose: "Team 协议、角色、工作流、知识挂载和质量门"
  shared_knowledge:
    path: "knowledge/shared/"
    include_in_delivery: true
    purpose: "全 Team 共享知识底座"
  role_knowledge:
    path: "knowledge/roles/"
    include_in_delivery: true
    purpose: "每个 Agent 的私有知识切片"
  cases:
    path: "knowledge/cases/"
    include_in_delivery: true
    purpose: "脱敏案例与演示样例"
  raw_refs:
    path: "knowledge/raw_refs/"
    include_in_delivery: true
    purpose: "原始材料来源索引，不默认包含原文"
  tests:
    path: "tests/"
    include_in_delivery: true
    purpose: "案例回放与数据化升级验收清单"

internal_only:
  - path: "../../../knowledge-base/"
    reason: "源知识库，可复用但不直接等同交付包"
  - path: "../../../process/"
    reason: "过程证据、OCR、深读记录，需筛选后外发"
  - path: "../../../书籍/"
    reason: "原始书籍和版权材料，默认不外发"

