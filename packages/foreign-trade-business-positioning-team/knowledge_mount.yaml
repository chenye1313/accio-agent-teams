case_memory:
  - "process/cases/case1_sweethome_extract.md"
  - "process/cases/case2_hotblizzard_profile.yaml"
  - "output/经营定位专家小闭环/case2_business_positioning_report.md"
  - "tests/case2_hotblizzard_replay.md"
  - "agent-ready/Teams/外贸经营定位专家Team/tests/sweethome_data_upgrade_replay.md"

scriptable_first:
  - "knowledge-base/经营定位/02_输入字段_schema.md"
  - "knowledge-base/经营定位/cards_index.yaml"
  - "knowledge-base/经营定位/04_经营定位报告模板.md"
  - "knowledge-base/经营罗盘/00_指标库.md"
  - "knowledge-base/经营定位/01_能力问题与验收.md"
  - "agent-ready/Teams/外贸经营定位专家Team/knowledge/shared/07_经营数据证据门.md"

forbidden:
  - "do_not_load_all_books_for_all_roles"
  - "do_not_treat_cases_as_universal_templates"
  - "do_not_generate_final_positioning_without_customer_evidence"
  - "do_not_write_expression_before_differentiation_passes"
  - "do_not_pass_quality_gate_without_metric_mapping"
  - "do_not_treat_public_competitor_scan_as_customer_sales_evidence"
