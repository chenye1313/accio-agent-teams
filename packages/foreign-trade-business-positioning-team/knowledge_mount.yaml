      - "agent-ready/Teams/外贸经营定位专家Team/knowledge/shared/05_经营罗盘指标映射.md"
      - "agent-ready/Teams/外贸经营定位专家Team/knowledge/shared/07_经营数据证据门.md"
    on_demand:
