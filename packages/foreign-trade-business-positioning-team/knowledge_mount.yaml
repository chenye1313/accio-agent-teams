version: "0.2"
updated: "2026-05-23"
purpose: "外贸经营定位专家 Team 的机器可读知识库挂载表。"

strategy:
  physical_layout: "one_project_knowledge_base"
  logical_layout: "shared_common_plus_role_private_slices"
  recommendation: "如果平台支持角色级知识库，使用 shared_common + role_private；如果平台只支持 Team 级知识库，则用 role instructions 限制每个 Agent 的读取范围。"

shared_common:
  - path: "knowledge-base/经营定位/01_能力问题与验收.md"
    purpose: "能力问题、红线、评分"
  - path: "knowledge-base/经营定位/02_输入字段_schema.md"
    purpose: "输入字段、最小 12 字段、访谈追问"
  - path: "knowledge-base/经营定位/cards_index.yaml"
    purpose: "BP_M00-BP_M07 方法路由"
  - path: "knowledge-base/经营定位/04_经营定位报告模板.md"
    purpose: "经营定位报告结构"
  - path: "knowledge-base/经营罗盘/00_指标库.md"
    purpose: "指标影响与复盘周期"
  - path: "agent-ready/Teams/外贸经营定位专家Team/knowledge/shared/02_输入字段与完整度.md"
    purpose: "经营数据字段、数据成熟度、最小数据包、脱敏规则"
  - path: "agent-ready/Teams/外贸经营定位专家Team/knowledge/shared/03_方法路由卡.md"
    purpose: "含 BP_M00.5 的新版方法路由"
  - path: "agent-ready/Teams/外贸经营定位专家Team/knowledge/shared/07_经营数据证据门.md"
    purpose: "数据可信度、数据到决策矩阵、输出降级规则"
  - path: "agent-ready/Teams/外贸经营定位专家Team/handoff_contract.yaml"
    purpose: "角色交接契约"
  - path: "agent-ready/Teams/外贸经营定位专家Team/quality_gates.md"
    purpose: "Team 红线与验收"

